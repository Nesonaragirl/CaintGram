name: Build Release APK

# Full release-type build (minified, shrunk, signed with the repo's
# release keystore config from gradle.properties). Manual trigger only,
# since this is a heavier/slower build than the debug test APK.

on:
  workflow_dispatch:
    inputs:
      abi:
        description: 'Which ABI to build for (fewer ABIs = faster build)'
        required: false
        default: 'arm64-v8a'
        type: choice
        options:
          - arm64-v8a
          - armeabi-v7a
          - x86_64
          - x86
          - all

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-release-${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-release-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Determine ABI filter
        id: abi
        run: |
          ABI="${{ github.event.inputs.abi }}"
          if [ -z "$ABI" ] || [ "$ABI" = "all" ]; then
            echo "flag=" >> "$GITHUB_OUTPUT"
          else
            echo "flag=-Pandroid.injected.build.abi=$ABI" >> "$GITHUB_OUTPUT"
          fi

      # "release" build type: minifyEnabled true, shrinkResources false,
      # signed with signingConfigs.release (values come from
      # gradle.properties: RELEASE_STORE_PASSWORD / RELEASE_KEY_ALIAS /
      # RELEASE_KEY_PASSWORD, using TMessagesProj/config/release.keystore).
      - name: Assemble release APK (afat flavor)
        run: >
          ./gradlew :TMessagesProj_App:assembleAfatRelease
          --parallel --build-cache
          -x lint -x test
          ${{ steps.abi.outputs.flag }}

      - name: Locate built APK(s)
        if: always()
        run: |
          echo "=== Searching the ENTIRE workspace for APKs ==="
          find . -iname "*.apk" -print 2>/dev/null || true

          echo
          echo "=== TMessagesProj_App/build/outputs tree ==="
          find TMessagesProj_App/build/outputs -maxdepth 6 2>/dev/null || echo "(directory does not exist)"

          echo
          echo "=== TMessagesProj_App/build/intermediates/apk tree ==="
          find TMessagesProj_App/build/intermediates/apk -maxdepth 6 2>/dev/null || echo "(directory does not exist)"

          echo
          APK_COUNT=$(find . -iname "*.apk" 2>/dev/null | wc -l)
          echo "Found $APK_COUNT apk file(s) in the whole workspace."
          if [ "$APK_COUNT" -eq 0 ]; then
            echo "::error::No APK was produced anywhere in the workspace despite a successful Gradle build."
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: |
            **/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload mapping files (ProGuard/R8, for deobfuscating crash reports)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-mapping
          path: |
            TMessagesProj_App/build/outputs/mapping/**
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload build logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            **/build/reports
          if-no-files-found: ignore
