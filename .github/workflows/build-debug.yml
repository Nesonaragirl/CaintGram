name=build-debug.sh
#!/usr/bin/env bash
set -euo pipefail

# build-debug.sh - prepare and build debug APK for Fluxgram (afatDebug)
# Run from repository root: ./build-debug.sh

REPO_ROOT="$(cd "$(dirname "$0")" && pwd)"
MODULE_APP="TMessagesProj_App"
KEYSTORE_RELATIVE_PATH="TMessagesProj/config/release.keystore"
KEYSTORE_PATH="$REPO_ROOT/$KEYSTORE_RELATIVE_PATH"
GRADLE_PROPS_FILE="$REPO_ROOT/gradle.properties"
LOCAL_PROPS_FILE="$REPO_ROOT/local.properties"

# Defaults in case gradle.properties doesn't specify them
DEFAULT_STORE_PASSWORD="android"
DEFAULT_KEY_ALIAS="androidkey"
DEFAULT_KEY_PASSWORD="android"

# Read signing values from gradle.properties if present
RELEASE_STORE_PASSWORD="$DEFAULT_STORE_PASSWORD"
RELEASE_KEY_ALIAS="$DEFAULT_KEY_ALIAS"
RELEASE_KEY_PASSWORD="$DEFAULT_KEY_PASSWORD"

if [ -f "$GRADLE_PROPS_FILE" ]; then
  # Use simple grep+cut to extract properties (works for typical key=val lines)
  val=$(grep -E '^RELEASE_STORE_PASSWORD=' "$GRADLE_PROPS_FILE" || true)
  if [ -n "$val" ]; then RELEASE_STORE_PASSWORD="${val#*=}"; fi
  val=$(grep -E '^RELEASE_KEY_ALIAS=' "$GRADLE_PROPS_FILE" || true)
  if [ -n "$val" ]; then RELEASE_KEY_ALIAS="${val#*=}"; fi
  val=$(grep -E '^RELEASE_KEY_PASSWORD=' "$GRADLE_PROPS_FILE" || true)
  if [ -n "$val" ]; then RELEASE_KEY_PASSWORD="${val#*=}"; fi
fi

echo "Repository root: $REPO_ROOT"
echo "Using keystore: $KEYSTORE_PATH"
echo "Using signing alias: $RELEASE_KEY_ALIAS"

# Ensure keystore directory exists
mkdir -p "$(dirname "$KEYSTORE_PATH")"

# Create a keystore if missing (used by signingConfigs.debug in project)
if [ ! -f "$KEYSTORE_PATH" ]; then
  if ! command -v keytool >/dev/null 2>&1; then
    echo "ERROR: keytool not found in PATH. Install JDK or ensure keytool is available." >&2
    exit 1
  fi

  echo "Keystore not found; creating keystore at $KEYSTORE_PATH"
  keytool -genkeypair \
    -alias "$RELEASE_KEY_ALIAS" \
    -keyalg RSA -keysize 2048 \
    -validity 10000 \
    -keystore "$KEYSTORE_PATH" \
    -storepass "$RELEASE_STORE_PASSWORD" \
    -keypass "$RELEASE_KEY_PASSWORD" \
    -dname "CN=Android Debug,O=Fluxgram,C=US" \
    -storetype JKS

  echo "Keystore created."
else
  echo "Keystore already exists, skipping creation."
fi

# Create local.properties if missing, using environment variables
if [ ! -f "$LOCAL_PROPS_FILE" ]; then
  echo "local.properties not found; attempting to create one from environment variables."

  if [ -n "${ANDROID_SDK_ROOT:-}" ]; then
    SDK_DIR="$ANDROID_SDK_ROOT"
  elif [ -n "${ANDROID_HOME:-}" ]; then
    SDK_DIR="$ANDROID_HOME"
  else
    echo "ERROR: ANDROID_SDK_ROOT or ANDROID_HOME is not set. Please set it to your Android SDK path." >&2
    exit 1
  fi

  echo "sdk.dir=$SDK_DIR" > "$LOCAL_PROPS_FILE"

  # Add ndk.dir if present in env
  if [ -n "${ANDROID_NDK_HOME:-}" ]; then
    echo "ndk.dir=$ANDROID_NDK_HOME" >> "$LOCAL_PROPS_FILE"
  elif [ -n "${ANDROID_NDK_ROOT:-}" ]; then
    echo "ndk.dir=$ANDROID_NDK_ROOT" >> "$LOCAL_PROPS_FILE"
  fi

  echo "Created local.properties with sdk.dir (and ndk.dir if available)."
else
  echo "local.properties already exists, leaving it unchanged."
fi

# Make sure gradlew is executable
if [ ! -x "$REPO_ROOT/gradlew" ]; then
  chmod +x "$REPO_ROOT/gradlew" || true
fi

# Run Gradle assemble for afatDebug variant (project filters require 'afat' flavor for non-release)
echo "Starting Gradle build (this will take a while)..."
cd "$REPO_ROOT"

# Use --no-daemon for reproducibility; remove -x lint if you want lint runs
./gradlew --no-daemon clean ":$MODULE_APP:assembleAfatDebug" --stacktrace

# Locate resulting APK (project overrides output filename to app.apk)
APK_PATH_CANDIDATES=(
  "$REPO_ROOT/$MODULE_APP/build/outputs/apk/afat/debug/app.apk"
  "$REPO_ROOT/$MODULE_APP/build/outputs/apk/afat/debug/${MODULE_APP}.apk"
)

FOUND_APK=""
for p in "${APK_PATH_CANDIDATES[@]}"; do
  if [ -f "$p" ]; then
    FOUND_APK="$p"
    break
  fi
done

if [ -n "$FOUND_APK" ]; then
  echo "Build finished. APK located at: $FOUND_APK"
else
  echo "Build finished, but APK not found at expected locations. Check $REPO_ROOT/$MODULE_APP/build/outputs/apk/ for outputs."
fi

exit 0
