name: Fast Build (arm64 test APK)

# Manual-only: Go to Actions → "Fast Build (arm64 test APK)" → Run workflow
# Builds arm64-v8a only — covers every modern Android phone.
# Skips x86 / x86_64 / armeabi-v7a → native compile is ~4x faster.
# Use this for quick iteration; use build.yml for release-ready universal APKs.

on:
  workflow_dispatch:

jobs:
  fast-build:
    name: arm64-only debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Android NDK r21e
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r21e
          add-to-path: true

      - name: Cache Gradle wrapper
        uses: actions/cache@v4
        with:
          path: ~/.gradle/wrapper
          key: gradle-wrapper-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-wrapper-

      - name: Cache Gradle caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            .gradle
          key: gradle-caches-${{ runner.os }}-${{ hashFiles('**/*.gradle', '**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-caches-${{ runner.os }}-

      # arm64-only native cache — separate key from the full-ABI cache so
      # the two workflows don't clobber each other's .so files.
      - name: Cache arm64 native build outputs
        uses: actions/cache@v4
        with:
          path: |
            TMessagesProj/jni/build
            TMessagesProj/src/main/libs
            TMessagesProj/src/main/obj
          key: ndk-arm64-${{ runner.os }}-${{ hashFiles('TMessagesProj/jni/**') }}
          restore-keys: ndk-arm64-${{ runner.os }}-

      - name: Stub BuildVars (debug placeholders)
        run: |
          FILE="TMessagesProj/src/main/java/org/telegram/messenger/BuildVars.java"
          if grep -q "YOUR_APP_ID\|0; // fill\|APP_ID = 0" "$FILE" 2>/dev/null; then
            sed -i \
              -e 's/APP_ID\s*=\s*0/APP_ID = 4/' \
              -e 's/APP_HASH\s*=\s*""/APP_HASH = "placeholder"/' \
              "$FILE"
          fi

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      # Build arm64-v8a only.
      # --no-build-cache forces every task to run and write output files to disk.
      # Without this, Gradle may mark tasks UP-TO-DATE from a previous full-ABI
      # run and skip writing the APK, leaving the output directory empty.
      - name: Build arm64 debug APK
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          ./gradlew :TMessagesProj_App:assembleAfatDebug \
            --no-daemon \
            --parallel \
            --no-build-cache \
            -Dorg.gradle.jvmargs="-Xmx6g -XX:+UseParallelGC" \
            -Pandroid.useAndroidX=true \
            -Pandroid.injected.build.abi=arm64-v8a

      # Show every APK in the workspace so we always know the real output path
      - name: Find all APKs in workspace
        if: always()
        run: |
          echo "=== All .apk files under workspace ==="
          find . -name "*.apk" 2>/dev/null | sort || echo "(no .apk files found)"
          echo ""
          echo "=== build/outputs directories ==="
          find . -type d -name "outputs" 2>/dev/null | sort

      - name: Upload arm64 APK
        uses: actions/upload-artifact@v4
        with:
          name: fluxgram-arm64-debug
          path: "**/build/outputs/apk/**/*.apk"
          if-no-files-found: error
          retention-days: 7
